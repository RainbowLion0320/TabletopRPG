<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d15"/>
      <stop offset="50%" stop-color="#1a1a28"/>
      <stop offset="100%" stop-color="#121220"/>
    </linearGradient>
    <radialGradient id="menace" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b3a3a" stop-opacity="0.12"/>
      <stop offset="70%" stop-color="#1a1a28" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="fog" cx="30%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#3a3a50" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="noise"><feTurbulence baseFrequency="0.5" numOctaves="4" type="fractalNoise"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.1"/></feComponentTransfer></filter>
  </defs>
  <rect width="960" height="360" fill="url(#bg)"/>
  <rect width="960" height="360" fill="url(#menace)"/>
  <rect width="960" height="360" fill="url(#fog)"/>
  <rect width="960" height="360" filter="url(#noise)" opacity="0.6"/>
  <!-- 雾气层 -->
  <ellipse cx="300" cy="200" rx="400" ry="80" fill="#3a3a50" opacity="0.04"/>
  <ellipse cx="700" cy="180" rx="350" ry="60" fill="#3a3a50" opacity="0.03"/>
  <!-- 血迹暗示 -->
  <ellipse cx="600" cy="280" rx="30" ry="8" fill="#8b3a3a" opacity="0.1"/>
  <ellipse cx="580" cy="300" rx="15" ry="4" fill="#8b3a3a" opacity="0.07"/>
  <rect y="300" width="960" height="60" fill="#08080f" opacity="0.6"/>
  <text x="480" y="180" text-anchor="middle" font-family="Georgia,serif" font-size="28" fill="#8b3a3a" opacity="0.25" letter-spacing="8">卡森其药店</text>
  <text x="480" y="210" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#8b3a3a" opacity="0.15" letter-spacing="4">CASSANGUI PHARMACY · BELLE ST</text>
</svg>
