<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="40%" stop-color="#151525"/>
      <stop offset="100%" stop-color="#0e0e1a"/>
    </linearGradient>
    <radialGradient id="moonlight" cx="75%" cy="15%" r="30%">
      <stop offset="0%" stop-color="#4a6a8a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="fogLayer" cx="50%" cy="70%" r="55%">
      <stop offset="0%" stop-color="#2a2a40" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="noise"><feTurbulence baseFrequency="0.55" numOctaves="4" type="fractalNoise"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.08"/></feComponentTransfer></filter>
  </defs>
  <rect width="960" height="360" fill="url(#bg)"/>
  <rect width="960" height="360" fill="url(#moonlight)"/>
  <rect width="960" height="360" fill="url(#fogLayer)"/>
  <rect width="960" height="360" filter="url(#noise)" opacity="0.5"/>
  <!-- 水面暗示 -->
  <rect x="0" y="260" width="960" height="4" fill="#4a6a8a" opacity="0.06"/>
  <ellipse cx="480" cy="270" rx="400" ry="20" fill="#4a6a8a" opacity="0.03"/>
  <!-- 船影 -->
  <polygon points="380,220 580,220 600,260 360,260" fill="#0a0a12" opacity="0.4"/>
  <line x1="490" y1="180" x2="490" y2="220" stroke="#1a1a30" stroke-width="2" opacity="0.3"/>
  <rect y="310" width="960" height="50" fill="#060610" opacity="0.6"/>
  <text x="480" y="160" text-anchor="middle" font-family="Georgia,serif" font-size="28" fill="#4a6a8a" opacity="0.25" letter-spacing="8">泰晤士港</text>
  <text x="480" y="190" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#4a6a8a" opacity="0.15" letter-spacing="4">THAMES PORT · THE FUSANG</text>
</svg>
