<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360">
  <defs>
    <radialGradient id="glow" cx="50%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#6b4c2a" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1f14"/>
      <stop offset="50%" stop-color="#4a3520"/>
      <stop offset="100%" stop-color="#3a2815"/>
    </linearGradient>
    <filter id="noise"><feTurbulence baseFrequency="0.65" numOctaves="3" type="fractalNoise"/><feColorMatrix type="saturate" values="0"/><feBlend in="SourceGraphic" mode="multiply" result="blend"/><feComponentTransfer><feFuncA type="linear" slope="0.08"/></feComponentTransfer></filter>
  </defs>
  <rect width="960" height="360" fill="url(#bg)"/>
  <rect width="960" height="360" fill="url(#glow)"/>
  <rect width="960" height="360" filter="url(#noise)" opacity="0.5"/>
  <!-- 壁灯光斑 -->
  <ellipse cx="480" cy="120" rx="280" ry="100" fill="#c9a84c" opacity="0.06"/>
  <ellipse cx="480" cy="100" rx="140" ry="60" fill="#c9a84c" opacity="0.08"/>
  <!-- 底部暗角 -->
  <rect y="280" width="960" height="80" fill="#1a1108" opacity="0.6"/>
  <text x="480" y="180" text-anchor="middle" font-family="Georgia,serif" font-size="28" fill="#c9a84c" opacity="0.3" letter-spacing="8">摩勒住宅</text>
  <text x="480" y="210" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#c9a84c" opacity="0.2" letter-spacing="4">MOLLER RESIDENCE · 1920</text>
</svg>
